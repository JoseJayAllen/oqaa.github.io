version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: documanage_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: documanage_db
      MYSQL_USER: documanage_user
      MYSQL_PASSWORD: documanage_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Flask Backend
  backend:
    build: .
    container_name: documanage_backend
    restart: always
    environment:
      FLASK_ENV: production
      SECRET_KEY: your-super-secret-key-change-this
      JWT_SECRET_KEY: your-jwt-secret-key-change-this
      DATABASE_URL: mysql+pymysql://documanage_user:documanage_pass@db:3306/documanage_db
      MAX_CONTENT_LENGTH: 104857600
      UPLOAD_FOLDER: /app/uploads
      CORS_ORIGINS: "*"
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "sleep 10 && 
             flask db upgrade && 
             flask init-db && 
             gunicorn -w 4 -b 0.0.0.0:5000 run:app"

  # phpMyAdmin (optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: documanage_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  mysql_data:
  uploads:
