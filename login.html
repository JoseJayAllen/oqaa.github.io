<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DocuManage</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="styles.css" rel="stylesheet">
  <style>
    .pending-alert {
      background: linear-gradient(135deg, #f6c23e 0%, #dda20a 100%);
      color: white;
      border: none;
    }
    .inactive-alert {
      background: linear-gradient(135deg, #e74a3b 0%, #be2617 100%);
      color: white;
      border: none;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        <i class="fas fa-folder-open"></i>
        <h3>DocuManage</h3>
        <p>Document Management System</p>
      </div>

      <!-- Status Messages -->
      <div id="statusMessage" style="display: none;"></div>

      <form class="auth-form" id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="fas fa-envelope text-muted"></i>
            </span>
            <input type="email" class="form-control border-start-0" id="loginEmail" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="fas fa-lock text-muted"></i>
            </span>
            <input type="password" class="form-control border-start-0" id="loginPassword" placeholder="Enter your password" required>
            <button type="button" class="input-group-text bg-transparent border-start-0" onclick="togglePassword('loginPassword')">
              <i class="fas fa-eye text-muted" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="text-primary text-decoration-none" onclick="showToast('Reset Password', 'Contact your administrator to reset your password.', 'info')">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>
  <!-- API Integration -->
  <script src="api.js"></script>
</body>
</html>
